set -g prefix C-w
bind-key C-w send-prefix

unbind r
unbind n
unbind C-l
unbind-key C-l
unbind l
unbind-key l
unbind %    # split-window -h
unbind '"'  # split-window
unbind ';'

bind r source-file ~/.tmux.conf

bind-key h select-pane -L
bind-key j select-pane -D 
bind-key k select-pane -U
bind-key l select-pane -R

bind-key \; switch-client -p
bind-key \' switch-client -n

bind-key \- kill-pane

bind-key -r c copy-mode
bind-key -r [ run-shell "tmux neww ~/.dotFiles/tmux-sessionizer.sh -a"
bind-key -r ] display-popup -E -w 50% -h 50% "~/.dotFiles/tmux-sessionizer.sh -o"
bind-key -r g display-popup -E -w 90% -h 90% lazygit

bind-key v split-window -h
bind-key s split-window -v

set -ag terminal-overrides ",xterm-256color:RGB"

set -g default-terminal "tmux-256color"

unbind t
bind-key -r t neww
bind-key -r T display-popup -E

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'MunifTanjim/tmux-mode-indicator' # Cool AF mode indicator 😉

# set -g status-position bottom
# set -g status-justify left
# set -g status-style 'fg=#1e1e2e'
