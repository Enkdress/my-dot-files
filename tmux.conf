# setw -g window-status-current-format ' #I #T '
#
# setw -g window-status-style 'fg=#9399b2'
# setw -g window-status-format ' #I #W '
#
# # messages
# set -g message-style 'fg=#1e1e2e bg=#b4befe bold'

set -g status-interval 10
set -g history-limit 20000
set -g buffer-limit 20
set -sg escape-time 0
set -g mouse on

set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

set-option -g allow-rename off
set -g monitor-activity on

# Themes
# set -g @plugin 'rose-pine/tmux'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavor 'macchiato'

# Active window shows only the app name
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_window_default_fill "all"

# Active window: rosewater for BOTH number and text bg
set -g @catppuccin_window_current_number_color "#{@thm_rosewater}"
set -g @catppuccin_window_current_text_color "#{@thm_rosewater}"

# Inactive window: status bar bg for BOTH number and text bg
set -g @catppuccin_window_number_color "#{@thm_bg}"
set -g @catppuccin_window_text_color "#{@thm_bg}"

# Inactive window text: your desired fg color
set -g @catppuccin_window_text "#[fg=#cdd6f4]#W"
set -g @catppuccin_window_number "#[fg=#cdd6f4]#I"

# Active window text: dark fg to contrast rosewater
set -g @catppuccin_window_current_text "#[fg=#{@thm_crust}]#W"
set -g @catppuccin_window_current_number "#[fg=#{@thm_crust}]#I"

# Status line layout
set -g status-left-length 100
set -g status-right-length 100

# Left: tmux mode indicator
set -g status-left "#{tmux_mode_indicator} #{E:@catppuccin_status_session}"

# Right: date and time
set -g status-right "#{E:@catppuccin_status_date_time}"

# Date/time format (optional, customize as you like)
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M "

